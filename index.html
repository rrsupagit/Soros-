<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soros</title>

  <script src="config.js"></script>

  <style>
    body{
      margin:0;
      font-family:Arial,Helvetica,sans-serif;
      background:#08111c;
      color:white;
    }

    header{
      text-align:center;
      padding:24px;
      font-size:30px;
      font-weight:bold;
      background:#0d1a2b;
    }

    .container{
      padding:18px;
      padding-bottom:120px;
    }

    .card{
      background:#121d2d;
      border-radius:18px;
      padding:22px;
      margin-bottom:18px;
    }

    .signal{
      text-align:center;
      font-size:18px;
      line-height:1.6;
      min-height:220px;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .status{
      margin-top:10px;
      font-size:15px;
      opacity:.9;
      text-align:center;
    }

    .stats-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .stat-box{
      background:#1a2739;
      border-radius:12px;
      padding:14px;
      text-align:center;
    }

    .stat-label{
      font-size:13px;
      opacity:.8;
      margin-bottom:6px;
    }

    .stat-value{
      font-size:22px;
      font-weight:bold;
    }

    button{
      width:100%;
      padding:18px;
      border:none;
      border-radius:14px;
      background:#10b9d3;
      color:white;
      font-size:17px;
      font-weight:bold;
      cursor:pointer;
      margin-top:10px;
    }

    button:disabled{
      background:#3a4d57;
      cursor:not-allowed;
    }

    .secondary{
      background:#223247;
    }

    .stop{
      background:#c0392b;
    }

    .nav{
      position:fixed;
      bottom:0;
      width:100%;
      background:#0d1a2b;
      display:flex;
    }

    .nav button{
      flex:1;
      border-radius:0;
      background:none;
      padding:18px;
      font-size:14px;
      color:white;
      margin-top:0;
    }

    .hidden{
      display:none;
    }

    .history-item{
      background:#1a2739;
      padding:14px;
      border-radius:12px;
      margin-bottom:12px;
      line-height:1.6;
    }

    .empty{
      opacity:.7;
      text-align:center;
    }

    .green{ color:#6ee7a8; }
    .red{ color:#ff8f8f; }
    .yellow{ color:#ffd166; }
  </style>
</head>

<body>

  <header>Soros</header>

  <div class="container">

    <div id="principal">

      <div class="card signal">
        <div id="signalText">Aguardando sinal...</div>
        <div id="timer" class="status"></div>
      </div>

      <div class="card">
        <div class="stats-grid">
          <div class="stat-box">
            <div class="stat-label">Total</div>
            <div id="statTotal" class="stat-value">0</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Win Rate</div>
            <div id="statWinRate" class="stat-value">0%</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">WIN</div>
            <div id="statWin" class="stat-value green">0</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">LOSS</div>
            <div id="statLoss" class="stat-value red">0</div>
          </div>
          <div class="stat-box" style="grid-column:1 / span 2;">
            <div class="stat-label">DRAW</div>
            <div id="statDraw" class="stat-value yellow">0</div>
          </div>
        </div>
      </div>

      <button id="singleButton" onclick="runSingle()">
        Operar 1x
      </button>

      <button id="startButton" class="secondary" onclick="startAuto()">
        Iniciar Auto
      </button>

      <button id="stopButton" class="stop" onclick="stopAuto()">
        Parar Auto
      </button>

    </div>

    <div id="historico" class="hidden">
      <div class="card">
        <h3>Histórico</h3>
        <div id="historyList" class="empty">Carregando...</div>
      </div>
    </div>

  </div>

  <div class="nav">
    <button onclick="showTab('principal')">Principal</button>
    <button onclick="showTab('historico');loadHistory();loadStats();">Histórico</button>
  </div>

  <script>
    let autoMode = false;
    let operationActive = false;
    let countdownInterval = null;

    function showTab(tab){
      document.getElementById("principal").classList.add("hidden");
      document.getElementById("historico").classList.add("hidden");
      document.getElementById(tab).classList.remove("hidden");
    }

    function average(arr){
      return arr.reduce((a,b)=>a+b,0)/arr.length;
    }

    async function getCandles(){
      const response = await fetch(
        `https://api.binance.com/api/v3/klines?symbol=${SOROS_CONFIG.BINANCE_SYMBOL}&interval=1m&limit=20`,
        { cache:"no-store" }
      );
      const data = await response.json();
      return data.map(candle => parseFloat(candle[4]));
    }

    async function getCurrentPrice(){
      const response = await fetch(
        `https://api.binance.com/api/v3/ticker/price?symbol=${SOROS_CONFIG.BINANCE_SYMBOL}`,
        { cache:"no-store" }
      );
      const data = await response.json();
      return parseFloat(data.price);
    }

    async function analyzeMarket(){
      const closes = await getCandles();

      const current = closes[closes.length - 1];
      const shortMA = average(closes.slice(-5));
      const longMA = average(closes.slice(-20));

      const a = closes[closes.length - 4];
      const b = closes[closes.length - 3];
      const c = closes[closes.length - 2];
      const d = closes[closes.length - 1];

      const momentumUp = a < b && b < c && c < d;
      const momentumDown = a > b && b > c && c > d;

      let direction = null;
      let trend = "NEUTRA";
      let confidence = 0;
      let momentum = "NEUTRO";

      if(momentumUp) momentum = "ALTA";
      if(momentumDown) momentum = "BAIXA";

      const maGapPct = Math.abs(shortMA - longMA) / current * 100;
      const priceGapPct = Math.abs(current - shortMA) / current * 100;

      if(shortMA > longMA && current > shortMA && momentumUp){
        direction = "CALL";
        trend = "ALTA";
        confidence = Math.round((maGapPct * 900) + (priceGapPct * 500) + 20);
      } else if(shortMA < longMA && current < shortMA && momentumDown){
        direction = "PUT";
        trend = "BAIXA";
        confidence = Math.round((maGapPct * 900) + (priceGapPct * 500) + 20);
      }

      if(confidence > 95) confidence = 95;
      if(direction && confidence < 55) confidence = 55;

      return {
        valid: !!direction,
        price: current,
        shortMA,
        longMA,
        direction,
        trend,
        confidence,
        momentum
      };
    }

    async function saveTrade(trade){
      await fetch(
        SOROS_CONFIG.SUPABASE_URL + "/rest/v1/signals",
        {
          method:"POST",
          headers:{
            "Content-Type":"application/json",
            "apikey":SOROS_CONFIG.SUPABASE_KEY,
            "Authorization":"Bearer " + SOROS_CONFIG.SUPABASE_KEY,
            "Prefer":"return=minimal"
          },
          body: JSON.stringify(trade)
        }
      );
    }

    async function loadHistory(){
      const list = document.getElementById("historyList");
      list.innerHTML = "Carregando...";

      const response = await fetch(
        SOROS_CONFIG.SUPABASE_URL + "/rest/v1/signals?select=*&order=created_at.desc&limit=30",
        {
          headers:{
            "apikey":SOROS_CONFIG.SUPABASE_KEY,
            "Authorization":"Bearer " + SOROS_CONFIG.SUPABASE_KEY
          }
        }
      );

      const data = await response.json();

      if(!data || data.length === 0){
        list.innerHTML = '<div class="empty">Nenhuma operação salva</div>';
        return;
      }

      list.innerHTML = "";

      data.forEach(item => {
        const div = document.createElement("div");
        div.className = "history-item";
        div.innerHTML = `
          <strong>${item.asset || "BTC/USD"}</strong><br>
          Direção: ${item.direction || "-"}<br>
          Entrada: ${item.entry_price ?? "-"}<br>
          Saída: ${item.exit_price ?? "-"}<br>
          Resultado: ${item.result || item.status || "-"}<br>
          Confiança: ${item.confidence ?? item.strength ?? "-"}%<br>
          Hora: ${item.time || "-"}
        `;
        list.appendChild(div);
      });
    }

    async function loadStats(){
      const response = await fetch(
        SOROS_CONFIG.SUPABASE_URL + "/rest/v1/signals?select=result&order=created_at.desc&limit=200",
        {
          headers:{
            "apikey":SOROS_CONFIG.SUPABASE_KEY,
            "Authorization":"Bearer " + SOROS_CONFIG.SUPABASE_KEY
          }
        }
      );

      const data = await response.json();

      let win = 0;
      let loss = 0;
      let draw = 0;

      data.forEach(item => {
        if(item.result === "WIN") win++;
        else if(item.result === "LOSS") loss++;
        else if(item.result === "DRAW") draw++;
      });

      const total = win + loss + draw;
      const winRate = total > 0 ? Math.round((win / total) * 100) : 0;

      document.getElementById("statTotal").innerText = total;
      document.getElementById("statWin").innerText = win;
      document.getElementById("statLoss").innerText = loss;
      document.getElementById("statDraw").innerText = draw;
      document.getElementById("statWinRate").innerText = winRate + "%";
    }

    function setIdleButtons(){
      document.getElementById("singleButton").disabled = false;
      document.getElementById("startButton").disabled = false;
    }

    function setBusyButtons(){
      document.getElementById("singleButton").disabled = true;
      document.getElementById("startButton").disabled = true;
    }

    async function executeCycle(){
      if(operationActive) return;

      operationActive = true;
      setBusyButtons();
      document.getElementById("signalText").innerHTML = "Analisando mercado...";
      document.getElementById("timer").innerText = "";

      const analysis = await analyzeMarket();

      if(!analysis.valid){
        document.getElementById("signalText").innerHTML = `
          Sem confluência agora<br>
          Média curta: ${analysis.shortMA.toFixed(2)}<br>
          Média longa: ${analysis.longMA.toFixed(2)}<br>
          Momentum: ${analysis.momentum}
        `;
        operationActive = false;
        setIdleButtons();

        if(autoMode){
          setTimeout(executeCycle, SOROS_CONFIG.AUTO_RETRY_SECONDS * 1000);
        }
        return;
      }

      const entryPrice = await getCurrentPrice();
      const direction = analysis.direction;
      const confidence = analysis.confidence;
      const startedAt = new Date().toLocaleTimeString();

      document.getElementById("signalText").innerHTML = `
        Ativo: ${SOROS_CONFIG.ASSET_LABEL}<br>
        Preço atual: ${analysis.price.toFixed(2)}<br>
        Média curta: ${analysis.shortMA.toFixed(2)}<br>
        Média longa: ${analysis.longMA.toFixed(2)}<br>
        Momentum: ${analysis.momentum}<br>
        Tendência: ${analysis.trend}<br>
        Confiança: ${confidence}%<br>
        Direção: ${direction}<br>
        Entrada: ${entryPrice.toFixed(2)}<br>
        Status: ATIVO
      `;

      let remaining = SOROS_CONFIG.SIGNAL_DURATION;

      document.getElementById("timer").innerText = `Resultado em ${remaining}s`;

      countdownInterval = setInterval(async () => {
        remaining--;
        document.getElementById("timer").innerText = `Resultado em ${remaining}s`;

        if(remaining <= 0){
          clearInterval(countdownInterval);

          const exitPrice = await getCurrentPrice();

          let result = "LOSS";

          if(direction === "CALL" && exitPrice > entryPrice) result = "WIN";
          else if(direction === "PUT" && exitPrice < entryPrice) result = "WIN";
          else if(exitPrice === entryPrice) result = "DRAW";

          document.getElementById("signalText").innerHTML = `
            Ativo: ${SOROS_CONFIG.ASSET_LABEL}<br>
            Direção: ${direction}<br>
            Entrada: ${entryPrice.toFixed(2)}<br>
            Saída: ${exitPrice.toFixed(2)}<br>
            Resultado: ${result}<br>
            Confiança: ${confidence}%<br>
            Status: FINALIZADO
          `;

          document.getElementById("timer").innerText = "Operação encerrada";

          await saveTrade({
            asset: SOROS_CONFIG.ASSET_LABEL,
            direction: direction,
            strength: confidence,
            confidence: confidence,
            time: startedAt,
            status: result,
            result: result,
            entry_price: entryPrice,
            exit_price: exitPrice,
            operation_seconds: SOROS_CONFIG.SIGNAL_DURATION,
            short_ma: analysis.shortMA,
            long_ma: analysis.longMA,
            momentum: analysis.momentum
          });

          await loadHistory();
          await loadStats();

          operationActive = false;
          setIdleButtons();

          if(autoMode){
            setTimeout(executeCycle, SOROS_CONFIG.AUTO_RETRY_SECONDS * 1000);
          }
        }
      }, 1000);
    }

    function runSingle(){
      autoMode = false;
      executeCycle();
    }

    function startAuto(){
      autoMode = true;
      executeCycle();
    }

    function stopAuto(){
      autoMode = false;
      clearInterval(countdownInterval);
      if(!operationActive){
        setIdleButtons();
      }
      document.getElementById("timer").innerText = "Auto parado";
    }

    loadHistory();
    loadStats();
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soros</title>

<script src="config.js"></script>

<style>
body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#08111c;
color:white;
}

header{
text-align:center;
padding:24px;
font-size:30px;
font-weight:bold;
background:#0d1a2b;
}

.container{
padding:18px;
padding-bottom:120px;
}

.card{
background:#121d2d;
border-radius:18px;
padding:22px;
margin-bottom:18px;
}

.signal{
text-align:center;
font-size:18px;
line-height:1.6;
min-height:180px;
display:flex;
flex-direction:column;
justify-content:center;
}

button{
width:100%;
padding:18px;
border:none;
border-radius:14px;
background:#10b9d3;
color:white;
font-size:17px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

button.stop{
background:#d33;
}

.nav{
position:fixed;
bottom:0;
width:100%;
background:#0d1a2b;
display:flex;
}

.nav button{
flex:1;
border-radius:0;
background:none;
padding:18px;
font-size:14px;
color:white;
}

.hidden{
display:none;
}

.history-item{
background:#1a2739;
padding:14px;
border-radius:12px;
margin-bottom:12px;
line-height:1.5;
}
</style>
</head>

<body>

<header>Soros</header>

<div class="container">

<div id="principal">

<div class="card signal">
<div id="signalText">Aguardando...</div>
<div id="timer"></div>
</div>

<button onclick="startAuto()">Iniciar Auto</button>
<button class="stop" onclick="stopAuto()">Parar Auto</button>

</div>

<div id="historico" class="hidden">
<div class="card">
<h3>Histórico</h3>
<div id="historyList">Carregando...</div>
</div>
</div>

</div>

<div class="nav">
<button onclick="showTab('principal')">Principal</button>
<button onclick="showTab('historico');loadHistory();">Histórico</button>
</div>

<script>

let autoMode=false
let operationActive=false

function showTab(tab){
document.getElementById("principal").classList.add("hidden")
document.getElementById("historico").classList.add("hidden")
document.getElementById(tab).classList.remove("hidden")
}

function average(arr){
return arr.reduce((a,b)=>a+b,0)/arr.length
}

async function getCandles(){
const r=await fetch(
"https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1m&limit=20",
{cache:"no-store"}
)

const data=await r.json()

return data.map(c=>parseFloat(c[4]))
}

async function getPrice(){
const r=await fetch(
"https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT",
{cache:"no-store"}
)

const d=await r.json()
return parseFloat(d.price)
}

async function analyzeMarket(){

const closes=await getCandles()

const short=average(closes.slice(-5))
const long=average(closes.slice(-20))

const price=closes[closes.length-1]

let direction="CALL"

if(price < short && short < long){
direction="PUT"
}

return{
price:price,
direction:direction,
short:short,
long:long
}

}

async function saveSignal(asset,direction,strength,time,status){

await fetch(
SOROS_CONFIG.SUPABASE_URL+"/rest/v1/signals",
{
method:"POST",
headers:{
"Content-Type":"application/json",
"apikey":SOROS_CONFIG.SUPABASE_KEY,
"Authorization":"Bearer "+SOROS_CONFIG.SUPABASE_KEY,
"Prefer":"return=minimal"
},
body:JSON.stringify({
asset:asset,
direction:direction,
strength:strength,
time:time,
status:status
})
}
)

}

async function operate(){

if(operationActive) return

operationActive=true

const analysis=await analyzeMarket()

const entry=analysis.price
const direction=analysis.direction

document.getElementById("signalText").innerHTML=`
BTC/USD<br>
Direção: ${direction}<br>
Entrada: ${entry}
`

let t=5

const timer=setInterval(()=>{
t--
document.getElementById("timer").innerText=`Resultado em ${t}s`
if(t<=0){
clearInterval(timer)
finishOperation(entry,direction)
}
},1000)

}

async function finishOperation(entry,direction){

const exit=await getPrice()

let result="LOSS"

if(direction==="CALL" && exit>entry) result="WIN"
if(direction==="PUT" && exit<entry) result="WIN"
if(exit===entry) result="DRAW"

document.getElementById("signalText").innerHTML=`
BTC/USD<br>
Entrada: ${entry}<br>
Saída: ${exit}<br>
Resultado: ${result}
`

await saveSignal("BTC/USD",direction,70,new Date().toLocaleTimeString(),result)

operationActive=false

if(autoMode){
setTimeout(operate,2000)
}

}

function startAuto(){
autoMode=true
operate()
}

function stopAuto(){
autoMode=false
}

async function loadHistory(){

const list=document.getElementById("historyList")

const r=await fetch(
SOROS_CONFIG.SUPABASE_URL+"/rest/v1/signals?select=*&order=created_at.desc&limit=20",
{
headers:{
"apikey":SOROS_CONFIG.SUPABASE_KEY,
"Authorization":"Bearer "+SOROS_CONFIG.SUPABASE_KEY
}
}
)

const data=await r.json()

list.innerHTML=""

data.forEach(item=>{

const div=document.createElement("div")

div.className="history-item"

div.innerHTML=`
${item.asset} | ${item.direction} | ${item.status}
`

list.appendChild(div)

})

}

loadHistory()

</script>

</body>
</html>

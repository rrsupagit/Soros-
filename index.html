<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soros</title>
  <script src="config.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #08111c;
      color: white;
    }

    header {
      text-align: center;
      padding: 24px;
      font-size: 30px;
      font-weight: bold;
      background: #0d1a2b;
    }

    .container {
      padding: 18px;
      padding-bottom: 100px;
    }

    .card {
      background: #121d2d;
      border-radius: 18px;
      padding: 22px;
      margin-bottom: 18px;
    }

    .signal {
      text-align: center;
      font-size: 18px;
      line-height: 1.6;
      min-height: 170px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .status {
      margin-top: 10px;
      font-size: 15px;
      opacity: 0.9;
    }

    .alert {
      margin-top: 12px;
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
      text-align: center;
      display: none;
    }

    .alert.error {
      background: #5a1f1f;
      color: #ffd7d7;
      display: block;
    }

    .alert.success {
      background: #124930;
      color: #d7ffe6;
      display: block;
    }

    button {
      width: 100%;
      padding: 18px;
      border: none;
      border-radius: 14px;
      background: #10b9d3;
      color: white;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
    }

    button:disabled {
      background: #3a4d57;
      cursor: not-allowed;
    }

    .nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #0d1a2b;
      display: flex;
    }

    .nav button {
      flex: 1;
      border-radius: 0;
      background: none;
      padding: 18px;
      font-size: 14px;
      color: white;
    }

    .hidden {
      display: none;
    }

    .history-item {
      background: #1a2739;
      padding: 14px;
      border-radius: 12px;
      margin-bottom: 12px;
      line-height: 1.5;
    }

    .empty-text {
      opacity: 0.75;
      text-align: center;
    }
  </style>
</head>
<body>

  <header>Soros</header>

  <div class="container">

    <div id="principal">
      <div class="card signal">
        <div id="signalText">Nenhum sinal ativo</div>
        <div id="timer" class="status"></div>
        <div id="appMessage" class="alert"></div>
      </div>

      <button id="generateButton" onclick="generateSignal()">
        Gerar Sinal
      </button>
    </div>

    <div id="historico" class="hidden">
      <div class="card">
        <h3>Histórico</h3>
        <div id="historyList" class="empty-text">Carregando...</div>
      </div>
    </div>

  </div>

  <div class="nav">
    <button onclick="showTab('principal')">Principal</button>
    <button onclick="showTab('historico'); loadHistory();">Histórico</button>
  </div>

  <script>
    let signalActive = false;
    let timerInterval = null;
    let remaining = SOROS_CONFIG.SIGNAL_DURATION;

    function showTab(tab) {
      document.getElementById("principal").classList.add("hidden");
      document.getElementById("historico").classList.add("hidden");
      document.getElementById(tab).classList.remove("hidden");
    }

    function showMessage(text, type) {
      const box = document.getElementById("appMessage");
      box.className = "alert " + type;
      box.textContent = text;
    }

    function clearMessage() {
      const box = document.getElementById("appMessage");
      box.className = "alert";
      box.textContent = "";
    }

    async function saveSignal(asset, direction, strength, time, status) {
      const response = await fetch(
        SOROS_CONFIG.SUPABASE_URL + "/rest/v1/signals",
        {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "apikey": SOROS_CONFIG.SUPABASE_KEY,
            "Authorization": "Bearer " + SOROS_CONFIG.SUPABASE_KEY,
            "Prefer": "return=representation"
          },
          body: JSON.stringify({
            asset: asset,
            direction: direction,
            strength: strength,
            time: time,
            status: status
          })
        }
      );

      if (!response.ok) {
        const errorText = await response.text();
        throw new Error("Falha ao salvar no banco: " + errorText);
      }

      return await response.json();
    }

    async function loadHistory() {
      const list = document.getElementById("historyList");
      list.innerHTML = "Carregando...";

      try {
        const response = await fetch(
          SOROS_CONFIG.SUPABASE_URL + "/rest/v1/signals?select=*&order=created_at.desc&limit=20",
          {
            method: "GET",
            headers: {
              "apikey": SOROS_CONFIG.SUPABASE_KEY,
              "Authorization": "Bearer " + SOROS_CONFIG.SUPABASE_KEY
            }
          }
        );

        if (!response.ok) {
          const errorText = await response.text();
          throw new Error("Falha ao carregar histórico: " + errorText);
        }

        const data = await response.json();

        if (!data || data.length === 0) {
          list.innerHTML = '<div class="empty-text">Nenhum sinal salvo ainda</div>';
          return;
        }

        list.innerHTML = "";

        data.forEach(item => {
          const div = document.createElement("div");
          div.className = "history-item";
          div.innerHTML = `
            <strong>${item.asset}</strong><br>
            Direção: ${item.direction}<br>
            Força: ${item.strength}%<br>
            Hora: ${item.time}<br>
            Status: ${item.status}
          `;
          list.appendChild(div);
        });
      } catch (error) {
        list.innerHTML = '<div class="empty-text">Erro ao carregar histórico</div>';
        showMessage(error.message, "error");
      }
    }

    async function generateSignal() {
      if (signalActive) {
        return;
      }

      clearMessage();

      signalActive = true;
      document.getElementById("generateButton").disabled = true;

      const ativo = SOROS_CONFIG.ATIVOS[
        Math.floor(Math.random() * SOROS_CONFIG.ATIVOS.length)
      ];

      const direcao = Math.random() > 0.5 ? "CALL" : "PUT";
      const forca = Math.floor(Math.random() * 30) + 70;
      const hora = new Date().toLocaleTimeString();

      document.getElementById("signalText").innerHTML = `
        Ativo: ${ativo}<br>
        Direção: ${direcao}<br>
        Força: ${forca}%<br>
        Hora: ${hora}<br>
        Status: ATIVO
      `;

      remaining = SOROS_CONFIG.SIGNAL_DURATION;
      document.getElementById("timer").innerText = `Expira em ${remaining}s`;

      try {
        await saveSignal(ativo, direcao, forca, hora, "ATIVO");
        showMessage("Sinal salvo no Supabase", "success");
      } catch (error) {
        showMessage(error.message, "error");
      }

      timerInterval = setInterval(() => {
        remaining--;
        document.getElementById("timer").innerText = `Expira em ${remaining}s`;

        if (remaining <= 0) {
          clearInterval(timerInterval);
          document.getElementById("timer").innerText = "Sinal expirado";
          document.getElementById("signalText").innerHTML = `
            Ativo: ${ativo}<br>
            Direção: ${direcao}<br>
            Força: ${forca}%<br>
            Hora: ${hora}<br>
            Status: EXPIRADO
          `;
          signalActive = false;
          document.getElementById("generateButton").disabled = false;
          loadHistory();
        }
      }, 1000);
    }

    loadHistory();
  </script>

</body>
</html>

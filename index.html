<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soros</title>

  <script src="config.js"></script>

  <style>
    body{
      margin:0;
      font-family:Arial,Helvetica,sans-serif;
      background:#08111c;
      color:white;
    }

    header{
      text-align:center;
      padding:24px;
      font-size:30px;
      font-weight:bold;
      background:#0d1a2b;
    }

    .container{
      padding:18px;
      padding-bottom:120px;
    }

    .card{
      background:#121d2d;
      border-radius:18px;
      padding:22px;
      margin-bottom:18px;
    }

    .signal{
      text-align:center;
      font-size:18px;
      line-height:1.6;
      min-height:280px;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .status{
      margin-top:10px;
      font-size:15px;
      opacity:.9;
      text-align:center;
    }

    .stats-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .stat-box{
      background:#1a2739;
      border-radius:12px;
      padding:14px;
      text-align:center;
    }

    .stat-label{
      font-size:13px;
      opacity:.8;
      margin-bottom:6px;
    }

    .stat-value{
      font-size:22px;
      font-weight:bold;
    }

    button{
      width:100%;
      padding:18px;
      border:none;
      border-radius:14px;
      background:#10b9d3;
      color:white;
      font-size:17px;
      font-weight:bold;
      cursor:pointer;
      margin-top:10px;
    }

    button:disabled{
      background:#3a4d57;
      cursor:not-allowed;
    }

    .secondary{
      background:#223247;
    }

    .stop{
      background:#c0392b;
    }

    .nav{
      position:fixed;
      bottom:0;
      width:100%;
      background:#0d1a2b;
      display:flex;
    }

    .nav button{
      flex:1;
      border-radius:0;
      background:none;
      padding:18px;
      font-size:14px;
      color:white;
      margin-top:0;
    }

    .hidden{
      display:none;
    }

    .history-item{
      background:#1a2739;
      padding:14px;
      border-radius:12px;
      margin-bottom:12px;
      line-height:1.6;
    }

    .empty{
      opacity:.7;
      text-align:center;
    }

    .green{ color:#6ee7a8; }
    .red{ color:#ff8f8f; }
    .yellow{ color:#ffd166; }
    .blue{ color:#7ec8ff; }
  </style>
</head>

<body>

  <header>Soros</header>

  <div class="container">

    <div id="principal">

      <div class="card signal">
        <div id="signalText">Aguardando análise...</div>
        <div id="timer" class="status"></div>
      </div>

      <div class="card">
        <div class="stats-grid">
          <div class="stat-box">
            <div class="stat-label">Total</div>
            <div id="statTotal" class="stat-value">0</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Win Rate</div>
            <div id="statWinRate" class="stat-value">0%</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">WIN</div>
            <div id="statWin" class="stat-value green">0</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">LOSS</div>
            <div id="statLoss" class="stat-value red">0</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">DRAW</div>
            <div id="statDraw" class="stat-value yellow">0</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Score Min</div>
            <div id="statMinScore" class="stat-value blue">0</div>
          </div>
        </div>
      </div>

      <button id="singleButton" onclick="runSingle()">
        Operar 1x
      </button>

      <button id="startButton" class="secondary" onclick="startAuto()">
        Iniciar Auto
      </button>

      <button id="stopButton" class="stop" onclick="stopAuto()">
        Parar Auto
      </button>

    </div>

    <div id="historico" class="hidden">
      <div class="card">
        <h3>Histórico</h3>
        <div id="historyList" class="empty">Carregando...</div>
      </div>
    </div>

  </div>

  <div class="nav">
    <button onclick="showTab('principal')">Principal</button>
    <button onclick="showTab('historico');loadHistory();">Histórico</button>
  </div>

  <script>
    let autoMode = false;
    let operationActive = false;
    let countdownInterval = null;

    let sessionStats = {
      total: 0,
      win: 0,
      loss: 0,
      draw: 0
    };

    const MIN_SCORE = Number(SOROS_CONFIG.MIN_SCORE_TO_TRADE || 80);

    document.getElementById("statMinScore").innerText = MIN_SCORE;

    function showTab(tab){
      document.getElementById("principal").classList.add("hidden");
      document.getElementById("historico").classList.add("hidden");
      document.getElementById(tab).classList.remove("hidden");
    }

    function average(arr){
      return arr.reduce((a,b)=>a+b,0)/arr.length;
    }

    function resetSessionStats(){
      sessionStats = {
        total: 0,
        win: 0,
        loss: 0,
        draw: 0
      };
      renderSessionStats();
    }

    function renderSessionStats(){
      const total = sessionStats.total;
      const winRate = total > 0 ? Math.round((sessionStats.win / total) * 100) : 0;

      document.getElementById("statTotal").innerText = total;
      document.getElementById("statWin").innerText = sessionStats.win;
      document.getElementById("statLoss").innerText = sessionStats.loss;
      document.getElementById("statDraw").innerText = sessionStats.draw;
      document.getElementById("statWinRate").innerText = winRate + "%";
      document.getElementById("statMinScore").innerText = MIN_SCORE;
    }

    function updateSessionResult(result){
      sessionStats.total++;

      if(result === "WIN") sessionStats.win++;
      else if(result === "LOSS") sessionStats.loss++;
      else if(result === "DRAW") sessionStats.draw++;

      renderSessionStats();
    }

    async function getCandles(){
      const response = await fetch(
        `https://api.binance.com/api/v3/klines?symbol=${SOROS_CONFIG.BINANCE_SYMBOL}&interval=1m&limit=20`,
        { cache:"no-store" }
      );

      const data = await response.json();

      return data.map(candle => ({
        openTime: candle[0],
        open: parseFloat(candle[1]),
        high: parseFloat(candle[2]),
        low: parseFloat(candle[3]),
        close: parseFloat(candle[4]),
        closeTime: candle[6]
      }));
    }

    async function getCurrentPrice(){
      const response = await fetch(
        `https://api.binance.com/api/v3/ticker/price?symbol=${SOROS_CONFIG.BINANCE_SYMBOL}`,
        { cache:"no-store" }
      );

      const data = await response.json();
      return parseFloat(data.price);
    }

    function calcVolatility(closes, current){
      const maxPrice = Math.max(...closes);
      const minPrice = Math.min(...closes);
      return ((maxPrice - minPrice) / current) * 100;
    }

    function calcMomentum(last4){
      const closes = last4.map(c => c.close);

      const up =
        closes[0] < closes[1] &&
        closes[1] < closes[2] &&
        closes[2] < closes[3];

      const down =
        closes[0] > closes[1] &&
        closes[1] > closes[2] &&
        closes[2] > closes[3];

      if(up) return "ALTA";
      if(down) return "BAIXA";
      return "NEUTRO";
    }

    async function analyzeMarket(){
      const candles = await getCandles();
      const closes = candles.map(c => c.close);

      const current = closes[closes.length - 1];
      const shortMA = average(closes.slice(-5));
      const longMA = average(closes.slice(-20));
      const momentum = calcMomentum(candles.slice(-4));
      const volatility = calcVolatility(closes.slice(-10), current);

      let direction = null;
      let trend = "NEUTRA";
      let score = 0;

      if(shortMA > longMA){
        score += 25;
        trend = "ALTA";
      }

      if(shortMA < longMA){
        score += 25;
        trend = "BAIXA";
      }

      if(current > shortMA && shortMA > longMA){
        score += 20;
        direction = "CALL";
      }

      if(current < shortMA && shortMA < longMA){
        score += 20;
        direction = "PUT";
      }

      if(momentum === "ALTA" && direction === "CALL"){
        score += 20;
      }

      if(momentum === "BAIXA" && direction === "PUT"){
        score += 20;
      }

      const maGapPct = Math.abs(shortMA - longMA) / current * 100;
      if(maGapPct >= 0.08){
        score += 15;
      }

      if(volatility >= 0.15){
        score += 10;
      }

      if(score > 100) score = 100;

      const valid = !!direction && score >= MIN_SCORE;

      return {
        valid,
        price: current,
        shortMA,
        longMA,
        direction,
        trend,
        score,
        momentum,
        volatility,
        lastClosedCandleCloseTime: candles[candles.length - 1].closeTime
      };
    }

    function getNextMinuteTimestamp(){
      const now = new Date();
      now.setSeconds(0, 0);
      return now.getTime() + 60000;
    }

    async function waitUntilNextMinute(){
      const target = getNextMinuteTimestamp();

      return new Promise(resolve => {
        const interval = setInterval(() => {
          const remainingMs = target - Date.now();
          const seconds = Math.max(0, Math.ceil(remainingMs / 1000));

          document.getElementById("timer").innerText = `Entrada no próximo minuto: ${seconds}s`;

          if(remainingMs <= 0){
            clearInterval(interval);
            resolve();
          }
        }, 250);
      });
    }

    async function waitOneFullMinuteFromNow(){
      const target = Date.now() + 60000;

      return new Promise(resolve => {
        countdownInterval = setInterval(() => {
          const remainingMs = target - Date.now();
          const seconds = Math.max(0, Math.ceil(remainingMs / 1000));

          document.getElementById("timer").innerText = `Fechamento em ${seconds}s`;

          if(remainingMs <= 0){
            clearInterval(countdownInterval);
            resolve();
          }
        }, 250);
      });
    }

    async function saveTrade(trade){
      await fetch(
        SOROS_CONFIG.SUPABASE_URL + "/rest/v1/signals",
        {
          method:"POST",
          headers:{
            "Content-Type":"application/json",
            "apikey": SOROS_CONFIG.SUPABASE_KEY,
            "Authorization":"Bearer " + SOROS_CONFIG.SUPABASE_KEY,
            "Prefer":"return=minimal"
          },
          body: JSON.stringify(trade)
        }
      );
    }

    async function cleanupOldTradesIfNeeded(){
      try{
        const countResponse = await fetch(
          `${SOROS_CONFIG.SUPABASE_URL}/rest/v1/signals?select=id&limit=1`,
          {
            headers:{
              "apikey": SOROS_CONFIG.SUPABASE_KEY,
              "Authorization":"Bearer " + SOROS_CONFIG.SUPABASE_KEY,
              "Prefer":"count=exact"
            }
          }
        );

        const contentRange = countResponse.headers.get("content-range");
        let totalRows = 0;

        if(contentRange && contentRange.includes("/")){
          totalRows = parseInt(contentRange.split("/")[1], 10) || 0;
        }

        if(totalRows < SOROS_CONFIG.MAX_DB_ROWS){
          return;
        }

        const oldestResponse = await fetch(
          `${SOROS_CONFIG.SUPABASE_URL}/rest/v1/signals?select=id&order=id.asc&limit=${SOROS_CONFIG.DELETE_OLD_ROWS}`,
          {
            headers:{
              "apikey": SOROS_CONFIG.SUPABASE_KEY,
              "Authorization":"Bearer " + SOROS_CONFIG.SUPABASE_KEY
            }
          }
        );

        const oldestData = await oldestResponse.json();

        if(!oldestData || oldestData.length === 0){
          return;
        }

        const thresholdId = oldestData[oldestData.length - 1].id;

        await fetch(
          `${SOROS_CONFIG.SUPABASE_URL}/rest/v1/signals?id=lte.${thresholdId}`,
          {
            method:"DELETE",
            headers:{
              "apikey": SOROS_CONFIG.SUPABASE_KEY,
              "Authorization":"Bearer " + SOROS_CONFIG.SUPABASE_KEY
            }
          }
        );
      } catch(error){
        console.log("Erro ao limpar histórico antigo:", error);
      }
    }

    async function loadHistory(){
      const list = document.getElementById("historyList");
      list.innerHTML = "Carregando...";

      const response = await fetch(
        `${SOROS_CONFIG.SUPABASE_URL}/rest/v1/signals?select=*&order=created_at.desc&limit=${SOROS_CONFIG.HISTORY_LIMIT}`,
        {
          headers:{
            "apikey": SOROS_CONFIG.SUPABASE_KEY,
            "Authorization":"Bearer " + SOROS_CONFIG.SUPABASE_KEY
          }
        }
      );

      const data = await response.json();

      if(!data || data.length === 0){
        list.innerHTML = '<div class="empty">Nenhuma operação salva</div>';
        return;
      }

      list.innerHTML = "";

      data.forEach(item => {
        const div = document.createElement("div");
        div.className = "history-item";
        div.innerHTML = `
          <strong>${item.asset || "BTC/USD"}</strong><br>
          Direção: ${item.direction || "-"}<br>
          Entrada: ${item.entry_price ?? "-"}<br>
          Saída: ${item.exit_price ?? "-"}<br>
          Resultado: ${item.result || item.status || "-"}<br>
          Score: ${item.confidence ?? item.strength ?? "-"}<br>
          Hora: ${item.time || "-"}
        `;
        list.appendChild(div);
      });
    }

    function setIdleButtons(){
      document.getElementById("singleButton").disabled = false;
      document.getElementById("startButton").disabled = false;
    }

    function setBusyButtons(){
      document.getElementById("singleButton").disabled = true;
      document.getElementById("startButton").disabled = true;
    }

    async function executeCycle(){
      if(operationActive) return;

      operationActive = true;
      setBusyButtons();

      document.getElementById("signalText").innerHTML = "Analisando candle de 1 minuto...";
      document.getElementById("timer").innerText = "";

      const analysis = await analyzeMarket();

      if(!analysis.valid){
        document.getElementById("signalText").innerHTML = `
          Sem entrada<br>
          Score: ${analysis.score}<br>
          Score mínimo: ${MIN_SCORE}<br>
          Tendência: ${analysis.trend}<br>
          Momentum: ${analysis.momentum}<br>
          Volatilidade: ${analysis.volatility.toFixed(3)}%<br>
          Média curta: ${analysis.shortMA.toFixed(2)}<br>
          Média longa: ${analysis.longMA.toFixed(2)}
        `;

        document.getElementById("timer").innerText = "Aguardando novo cenário";

        operationActive = false;
        setIdleButtons();

        if(autoMode){
          setTimeout(executeCycle, SOROS_CONFIG.AUTO_RETRY_SECONDS * 1000);
        }
        return;
      }

      document.getElementById("signalText").innerHTML = `
        Ativo: ${SOROS_CONFIG.ASSET_LABEL}<br>
        Preço atual: ${analysis.price.toFixed(2)}<br>
        Média curta: ${analysis.shortMA.toFixed(2)}<br>
        Média longa: ${analysis.longMA.toFixed(2)}<br>
        Momentum: ${analysis.momentum}<br>
        Volatilidade: ${analysis.volatility.toFixed(3)}%<br>
        Score: ${analysis.score}<br>
        Direção: ${analysis.direction}<br>
        Status: AGUARDANDO VIRAR O MINUTO
      `;

      await waitUntilNextMinute();

      const entryPrice = await getCurrentPrice();
      const direction = analysis.direction;
      const score = analysis.score;
      const startedAt = new Date().toLocaleTimeString();

      document.getElementById("signalText").innerHTML = `
        Ativo: ${SOROS_CONFIG.ASSET_LABEL}<br>
        Direção: ${direction}<br>
        Score: ${score}<br>
        Entrada: ${entryPrice.toFixed(2)}<br>
        Status: OPERANDO 1 MINUTO
      `;

      await waitOneFullMinuteFromNow();

      const exitPrice = await getCurrentPrice();

      let result = "LOSS";

      if(direction === "CALL" && exitPrice > entryPrice) result = "WIN";
      else if(direction === "PUT" && exitPrice < entryPrice) result = "WIN";
      else if(exitPrice === entryPrice) result = "DRAW";

      document.getElementById("signalText").innerHTML = `
        Ativo: ${SOROS_CONFIG.ASSET_LABEL}<br>
        Direção: ${direction}<br>
        Entrada: ${entryPrice.toFixed(2)}<br>
        Saída: ${exitPrice.toFixed(2)}<br>
        Resultado: ${result}<br>
        Score: ${score}<br>
        Status: FINALIZADO
      `;

      document.getElementById("timer").innerText = "Operação encerrada";

      await saveTrade({
        asset: SOROS_CONFIG.ASSET_LABEL,
        direction: direction,
        strength: score,
        confidence: score,
        time: startedAt,
        status: result,
        result: result,
        entry_price: entryPrice,
        exit_price: exitPrice,
        operation_seconds: 60,
        short_ma: analysis.shortMA,
        long_ma: analysis.longMA,
        momentum: analysis.momentum
      });

      await cleanupOldTradesIfNeeded();
      await loadHistory();

      updateSessionResult(result);

      operationActive = false;
      setIdleButtons();

      if(autoMode){
        setTimeout(executeCycle, SOROS_CONFIG.AUTO_RETRY_SECONDS * 1000);
      }
    }

    function runSingle(){
      autoMode = false;
      executeCycle();
    }

    function startAuto(){
      autoMode = true;
      resetSessionStats();
      executeCycle();
    }

    function stopAuto(){
      autoMode = false;
      clearInterval(countdownInterval);

      if(!operationActive){
        setIdleButtons();
      }

      document.getElementById("timer").innerText = "Auto parado";
    }

    renderSessionStats();
    loadHistory();
  </script>

</body>
</html>

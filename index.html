<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Soros</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#08111c;
color:white;
}

header{
text-align:center;
padding:24px;
font-size:30px;
font-weight:bold;
background:#0d1a2b;
}

.container{
padding:18px;
padding-bottom:100px;
}

.card{
background:#121d2d;
border-radius:18px;
padding:22px;
margin-bottom:18px;
}

.signal{
text-align:center;
font-size:18px;
line-height:1.6;
min-height:170px;
display:flex;
flex-direction:column;
justify-content:center;
}

button{
width:100%;
padding:18px;
border:none;
border-radius:14px;
background:#10b9d3;
color:white;
font-size:17px;
font-weight:bold;
cursor:pointer;
}

button:disabled{
background:#3a4d57;
}

.nav{
position:fixed;
bottom:0;
width:100%;
background:#0d1a2b;
display:flex;
}

.nav button{
flex:1;
border-radius:0;
background:none;
padding:18px;
font-size:14px;
color:white;
}

.hidden{
display:none;
}

.history-item{
background:#1a2739;
padding:14px;
border-radius:12px;
margin-bottom:12px;
}

</style>

</head>

<body>

<header>Soros</header>

<div class="container">

<div id="principal">

<div class="card signal">

<div id="signalText">
Nenhum sinal ativo
</div>

<div id="timer"></div>

</div>

<button id="generateButton" onclick="generateSignal()">
Gerar Sinal
</button>

</div>

<div id="historico" class="hidden">

<div class="card">

<h3>Histórico</h3>

<div id="historyList">
Carregando...
</div>

</div>

</div>

</div>

<div class="nav">

<button onclick="showTab('principal')">Principal</button>
<button onclick="showTab('historico')">Histórico</button>

</div>

<script>

const supabase = window.supabase.createClient(
SOROS_CONFIG.SUPABASE_URL,
SOROS_CONFIG.SUPABASE_KEY
)

let signalActive=false
let timerInterval=null
let remaining=SOROS_CONFIG.SIGNAL_DURATION

function showTab(tab){

document.getElementById("principal").classList.add("hidden")
document.getElementById("historico").classList.add("hidden")

document.getElementById(tab).classList.remove("hidden")

}

async function generateSignal(){

if(signalActive) return

signalActive=true

const ativo=SOROS_CONFIG.ATIVOS[
Math.floor(Math.random()*SOROS_CONFIG.ATIVOS.length)
]

const direcao=Math.random()>0.5?"CALL":"PUT"

const forca=Math.floor(Math.random()*30)+70

const hora=new Date().toLocaleTimeString()

remaining=SOROS_CONFIG.SIGNAL_DURATION

document.getElementById("signalText").innerHTML=`
Ativo: ${ativo}<br>
Direção: ${direcao}<br>
Força: ${forca}%<br>
Hora: ${hora}<br>
Status: ATIVO
`

saveSignal(ativo,direcao,forca,hora)

timerInterval=setInterval(()=>{

remaining--

document.getElementById("timer").innerText=
`Expira em ${remaining}s`

if(remaining<=0){

clearInterval(timerInterval)

document.getElementById("timer").innerText="Sinal expirado"

signalActive=false

}

},1000)

}

async function saveSignal(asset,direction,strength,time){

await supabase
.from("signals")
.insert({
asset,
direction,
strength,
time,
status:"EXPIRADO"
})

loadHistory()

}

async function loadHistory(){

const {data}=await supabase
.from("signals")
.select("*")
.order("created_at",{ascending:false})
.limit(20)

const list=document.getElementById("historyList")

list.innerHTML=""

data.forEach(item=>{

const div=document.createElement("div")

div.className="history-item"

div.innerHTML=`
${item.asset} |
${item.direction} |
${item.strength}% |
${item.time}
`

list.appendChild(div)

})

}

loadHistory()

</script>

</body>
</html>
